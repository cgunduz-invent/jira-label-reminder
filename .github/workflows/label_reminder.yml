name: Jira Label Reminder → Slack

on:
  schedule:
    # Her hafta içi (Pazartesi-Cuma) saat 09:00 Türkiye saatiyle
    # UTC+3 olduğu için UTC'de 06:00 = TR'de 09:00
    - cron: "13 6 * * 1-5"

  # İstersen butona basarak da çalıştır (test için kullanışlı)
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Node.js 24 uyarısını giderir

jobs:
  send-reminder:
    runs-on: ubuntu-latest

    steps:
      # 1. Repo'yu çek
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Python kur
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3. Bağımlılıkları yükle
      - name: Install dependencies
        run: pip install requests

      # 4. Script'i çalıştır (Secret'lar otomatik env'e enjekte edilir)
      - name: Run label reminder
        env:
          JIRA_EMAIL:      ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN:  ${{ secrets.JIRA_API_TOKEN }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: python label_reminder.py
